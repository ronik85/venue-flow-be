version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: venue-flow-api

    restart: unless-stopped

    ports:
      - '3000:3000'

    env_file:
      - .env.docker

    depends_on:
      - postgres
      - redis

    volumes:
      - .:/app
      - /app/node_modules

    command: npm run start:dev

  postgres:
    image: postgres:16

    container_name: venue-flow-postgres

    restart: unless-stopped

    ports:
      - '5433:5432'

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: venue_flow_db

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

    container_name: venue-flow-redis

    restart: unless-stopped

    ports:
      - '6379:6379'

volumes:
  postgres_data:
